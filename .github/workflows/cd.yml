name: CD — Benchmark & Release

# Runs the full benchmark suite on every merge to main so you can track
# optimizer performance over time.  On a version tag (v*.*.*) it also
# creates a GitHub Release and attaches the benchmark report.
on:
  push:
    branches: [main]
    tags: ["v*.*.*"]

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Full benchmark ──────────────────────────────────────────────────────
  benchmark:
    name: Full landscape benchmark
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run full landscape comparison
        working-directory: phase1/project_root
        run: |
          python main.py \
            --sweep fullbench \
            --dim 5 \
            --steps 200 \
            --trials 10 \
            --seed 42 \
            | tee benchmark_results.txt

      - name: Save plots
        working-directory: phase1/project_root
        run: |
          mkdir -p outputs
          python main.py --landscape sphere     --dim 5 --steps 200 --sweep compare --save outputs/
          python main.py --landscape rosenbrock --dim 5 --steps 200 --sweep compare --save outputs/
          python main.py --landscape rastrigin  --dim 5 --steps 200 --sweep compare --save outputs/

      - name: Write benchmark summary
        working-directory: phase1/project_root
        run: |
          echo "## Benchmark Results — $(date -u +'%Y-%m-%d %H:%M UTC')" > summary.md
          echo "" >> summary.md
          echo "**Commit:** \`${{ github.sha }}\`" >> summary.md
          echo "**Triggered by:** ${{ github.event_name }}" >> summary.md
          echo "" >> summary.md
          echo '```' >> summary.md
          cat benchmark_results.txt >> summary.md
          echo '```' >> summary.md

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-${{ github.sha }}
          path: |
            phase1/project_root/benchmark_results.txt
            phase1/project_root/summary.md
            phase1/project_root/outputs/
          retention-days: 90

  # ── 2. GitHub Release (tags only) ─────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: benchmark
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write     # needed to create releases

    steps:
      - uses: actions/checkout@v4

      - name: Download benchmark artifact
        uses: actions/download-artifact@v4
        with:
          name: benchmark-${{ github.sha }}
          path: release-assets/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "TNMO ${{ github.ref_name }}"
          body_path: release-assets/summary.md
          files: |
            release-assets/benchmark_results.txt
            release-assets/outputs/*.png
          generate_release_notes: true   # auto-includes PR/commit changelog
          draft: false
          prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}
