name: Python CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip' # Speeds up subsequent runs by caching dependencies

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        
        # Install CPU-only PyTorch for faster CI runs
        pip install torch --index-url https://download.pytorch.org/whl/cpu
        
        # Install other core libraries and testing tools
        pip install numpy pandas flake8 pytest
        
        # NOTE: If you have a requirements.txt, uncomment the line below:
        # pip install -r requirements.txt

    - name: Lint with flake8
      run: |
        # Stop the build if there are critical Python syntax errors
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Treat other formatting issues as warnings
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Run unit tests with pytest
      run: |
        pytest